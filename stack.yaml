flags:
  pandoc:
    embed_data_files: true
  QuickCheck:
    old-random: false
packages:
- '.'
- 'pandoc-cli'
- 'pandoc-lua-engine'
- 'pandoc-server'
extra-deps:
- hslua-2.5.0
- hslua-marshalling-2.3.2
- hslua-module-doclayout-1.2.1.1
- hslua-module-path-1.2.0
- hslua-module-text-1.2.0
- hslua-module-system-1.3.0
- hslua-module-version-1.2.0.1
- hslua-module-zip-1.2.1
- hslua-objectorientation-2.5.0
- hslua-packaging-2.4.1
- hslua-typing-0.2.0
- pandoc-lua-marshal-0.3.2.1
- citeproc-0.13
- skylighting-format-blaze-html-0.1.2
- djot-0.1.4
- asciidoc-0.1.0.2
- doclayout-0.5.0.1
- git: https://github.com/jgm/typst-hs.git
  commit: 19e835d40663a92df5bed4e8a0fca5465cacdd6b
- git: https://github.com/jgm/typst-symbols.git
  commit: 6e97668c9f2ffea09f3187c34b7641038370fd21
- git: https://github.com/jgm/texmath.git
  commit: 0a3fbebc5d0e21769f01b048eb63e1451ccf0e1a

ghc-options:
   "$locals": -fhide-source-paths -Wno-missing-home-modules
resolver: lts-24.20
nix:
  packages:
  - pkg-config
  - zlib
