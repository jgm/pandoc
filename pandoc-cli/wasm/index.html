<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pandoc-wasm playground</title>
    <style>
      body {
        display: flex;
        flex-direction: column;
        height: 100vh;
        margin: 0;
        font-family: monospace;
      }

      .container {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      textarea {
        width: 50%;
        height: 100%;
        border: none;
        padding: 1rem;
        resize: none;
        box-sizing: border-box;
        font-size: 1rem;
        font-family: monospace;
      }

      #input {
        border-right: 1px solid #ccc;
      }

      #output {
        background-color: #f5f5f5;
        color: #333;
      }

      #error {
        background-color: red;
        color: white;
        padding: 6pt;
        display: none;
      }

      #warnings {
        background-color: #f5f5f5;
        color: #333;
        max-height: 4em;
        overflow: scroll;
        width: 100%;
        display: none;
      }

      span.verbosity {
        padding-left: 6pt;
        min-width: 7em;
      }

      .WARNING {
        color: red;
      }

      .INFO {
        color: green;
      }

      #arguments-container {
        padding: 0.5rem;
        border-top: 1px solid #ccc;
        background-color: #f9f9f9;
      }

      #arguments {
        width: calc(100% - 1rem);
        padding: 0.5rem;
        font-size: 1rem;
        box-sizing: border-box;
        font-family: monospace;
      }

      #upload-container {
        padding: 0.5rem;
        border-top: 1px solid #ccc;
        background-color: #f0f0f0;
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      #instructions {
        color: #666;
      }

      #file-list {
        flex: 1;
        font-size: 0.9rem;
        color: #666;
      }

      #file-list span {
        margin-right: 12pt;
      }

      #file-list a {
        color: #007bff;
        text-decoration: none;
        cursor: pointer;
      }

      #file-list a.delete {
        margin-right: 3pt;
      }

      #file-list a:hover {
        text-decoration: underline;
      }

      #upload-btn {
        padding: 0.5rem 1rem;
        cursor: pointer;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 4px;
        font-family: monospace;
        transition: background-color 0.2s;
      }

      #upload-btn:hover {
        background-color: #0056b3;
      }

      #upload-btn.drag-over {
        background-color: #0056b3;
        box-shadow: 0 0 8px rgba(0, 123, 255, 0.5);
      }

      #examples-container {
        padding: 0.5rem 1rem;
        background-color: #f0f0f0;
        border-bottom: 1px solid #ccc;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #examples-container h1 {
        margin: 0;
        font-size: 1.2rem;
        font-weight: bold;
      }

      #examples {
        padding: 0.5rem;
        font-family: monospace;
        font-size: 0.9rem;
        border: 1px solid #ccc;
        border-radius: 4px;
        background-color: white;
      }
    </style>
  </head>
  <body>
    <div id="examples-container">
      <h1>Try pandoc.wasm</h1>
      <select id="examples">
        <option value="">Load example...</option>
        <option value="examples/bibtex-to-csljson.tar">BibTeX to CSL JSON</option>
        <option value="examples/csv-table-to-org.tar">CSV table to Org</option>
        <option value="examples/custom-template.tar">Custom template</option>
        <option value="examples/docx-with-equations-to-latex.tar">DOCX with equations to LaTeX</option>
        <option value="examples/hello-world.tar">Hello world</option>
        <option value="examples/highlighted-code-to-html.tar">Highlighted code to HTML</option>
        <option value="examples/ipynb-to-rtf.tar">Jupyter notebook to RTF</option>
        <option value="examples/latex-to-docbook-with-mathml.tar">LaTeX to DocBook with MathML</option>
        <option value="examples/latex-with-macros-to-restructured-text.tar">LaTeX with macros to RST</option>
        <option value="examples/man-page-to-context.tar">Man page to ConTeXt</option>
        <option value="examples/markdown-citations-to-plain-with-csl-style.tar">Markdown citations to plain</option>
        <option value="examples/markdown-to-docbook-with-citations.tar">Markdown to DocBook with citations</option>
        <option value="examples/markdown-to-revealjs-slides.tar">Markdown to reveal.js slides</option>
        <option value="examples/markdown-to-rst.tar">Markdown to RST</option>
        <option value="examples/mediawiki-to-docx-with-equations.tar">MediaWiki to DOCX with equations</option>
        <option value="examples/ris-to-formatted-markdown-bibliography.tar">RIS to Markdown bibliography</option>
        <option value="examples/rst-table-from-yaml-data.tar">RST table from YAML data</option>
      </select>
    </div>
    <div class="container">
      <textarea
        id="input"
        readonly
        placeholder="Loading wasm module..."></textarea>
      <textarea
        id="output"
        readonly
        placeholder="Output will be displayed here..."></textarea>
    </div>
    <div id="error"></div>
    <div id="warnings" readonly></div>
    <div id="upload-container">
      <input type="file" id="file-input" multiple style="display: none;" />
      <button id="upload-btn" onclick="document.getElementById('file-input').click()">
        Upload Files
      </button>
      <div id="file-list"></div>
      <div id="instructions">(or drag files here to upload them)</div>
    </div>
    <div id="arguments-container">
      <input type="text" id="arguments" value="{&quot;from&quot;: &quot;markdown&quot;, &quot;to&quot;: &quot;rst&quot;}"/>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/js-untar@2.0.0/build/dist/untar.min.js"></script>
    <script type="module">
      import { pandoc } from "./pandoc.js";

      const uploads = {};

      document.getElementById("input").readOnly = false;
      document.getElementById("input").placeholder = "Enter your input here...";

      /* Fetch the tar at tarpath, use untar to unpack it. Create files for
         every file in the tar except options.json and stdin, and put them in uploads.
         Fill in the input textarea with stdin (or clear if not present).
         Fill in the arguments field with the JSON from options.json. */
      async function loadExampleFromTar(tarpath) {
        const response = await fetch(tarpath);
        const arrayBuffer = await response.arrayBuffer();
        const files = await untar(arrayBuffer);

        let optionsJson = '{}';
        let stdin = '';

        for (const file of files) {
          // Skip directories (they have no blob or empty size)
          if (file.name.endsWith('/') || file.size === 0) continue;

          // Get just the filename without any directory prefix
          const filename = file.name.split('/').pop();

          if (filename === 'options.json') {
            optionsJson = new TextDecoder().decode(file.buffer);
          } else if (filename === 'stdin') {
            stdin = new TextDecoder().decode(file.buffer);
          } else {
            // Add to uploads as a Blob
            uploads[filename] = file.blob;
          }
        }

        updateFileList();
        document.getElementById("input").value = stdin;
        document.getElementById("arguments").value = optionsJson;
      }

      document.getElementById("examples").addEventListener("change", async (e) => {
        const tarpath = e.target.value;
        if (tarpath) {
          await loadExampleFromTar(tarpath);
          e.target.value = "";  // Reset dropdown
          updateOutput();  // Trigger conversion
        }
      });

      function handleFiles(files) {
        for (const file of files) {
          uploads[file.name] = file;
        }
        updateFileList();
      }

      document.getElementById("file-input").addEventListener("change", async (e) => {
        const files = Array.from(e.target.files);
        handleFiles(files);
        e.target.value = "";
      });

      // Drag and drop functionality
      const uploadContainer = document.getElementById("upload-container");

      uploadContainer.addEventListener("dragover", (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadContainer.classList.add("drag-over");
      });

      uploadContainer.addEventListener("dragenter", (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadContainer.classList.add("drag-over");
      });

      uploadContainer.addEventListener("dragleave", (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadContainer.classList.remove("drag-over");
      });

      uploadContainer.addEventListener("drop", async (e) => {
        e.preventDefault();
        e.stopPropagation();
        uploadContainer.classList.remove("drag-over");

        const files = Array.from(e.dataTransfer.files);
        handleFiles(files);
      });

      function updateFileList() {
        const fileListDiv = document.getElementById("file-list");
        let fs = Object.getOwnPropertyNames(uploads)
                        .map(name => `<span data-filename="${name}"><a href="#" class="delete" title="Delete ${name}" data-filename="${name}">&#x00d7;</a><a href="#" class="download" title="Download ${name}" data-filename="${name}">${name}</a></span>`)
        if (fs.size === 0) {
          fileListDiv.innerHTML = "";
        } else {
          fileListDiv.innerHTML = fs.join("");

          // Add click handlers to download files
          fileListDiv.querySelectorAll("a.download").forEach(link => {
            link.addEventListener("click", (e) => {
              e.preventDefault();
              downloadFile(e.target.dataset.filename);
            });
          });
          // Add click handlers to delete files.
          fileListDiv.querySelectorAll("a.delete").forEach(link => {
            link.addEventListener("click", (e) => {
              e.preventDefault();
              delete uploads[e.target.dataset.filename];
              updateFileList();
            });
          });
        }
      }

     function downloadFile(filename) {
       const blob = uploads[filename];
       if (!blob) return;

        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      }

      let updateTimeout = null;
      const inputPane = document.getElementById("input");
      const outputPane = document.getElementById("output");
      const errorPane = document.getElementById("error");
      const warningDiv = document.getElementById("warnings");

      async function updateOutput() {
        let options;
        try {
          options = JSON.parse(document.getElementById("arguments").value);
          const inputText = inputPane.value;
          try {
            warnings.innerHTML = "";
            outputPane.value = "";
            errorPane.style.display = "none";
            const result = await pandoc(options, inputText, uploads);
            updateFileList();
            inputPane.style.visibility =
              (options["input-files"] && "hidden" || "visible");
            warnings.style.display =
              (result.warnings.length == 0 && "none" || "block");
            if (options["output-file"] && result.stderr.match(/^ERROR:/)) {
              delete uploads[options["output-file"]];
              updateFileList();
            }
            outputPane.value = result.stderr || result.stdout;
            for (const warning of result.warnings) {
               warningDiv.insertAdjacentHTML("beforeend",
                 `<p class="${warning.verbosity}"><span class="verbosity">${warning.verbosity}</span> ${warning.pretty}</p>`);
             }
          } catch (err) {
            errorPane.style.display = "block";
            errorPane.innerText = `Error: ${err.message}`;
          }
        } catch (e) {
          errorPane.style.display = "block";
          errorPane.innerText = `JSON parsing error: ${e}`;
          options = {};
        }
      }

      function debouncedUpdate() {
        if (updateTimeout) {
          clearTimeout(updateTimeout);
        }
        updateTimeout = setTimeout(updateOutput, 200);
      }

      inputPane.addEventListener("input", debouncedUpdate);
      let args = document.getElementById("arguments");
      args.addEventListener("keydown", function(e) {
          if (e.key == "Enter") {
            e.preventDefault();
            updateOutput();
          }
        });
      args.addEventListener("focusout", function(e) {
            updateOutput();
        });
    </script>
  </body>
</html>
